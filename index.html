<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartel Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#183264;--navy2:#0e1c3e;--light:#eef2f8;--border:#dce3f0;--gray:#64748b;--lgray:#f8fafc;--green:#10b981;--red:#ef4444;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4fa;color:#1e293b;min-height:100vh;}
header{background:var(--navy);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(14,28,62,.3);}
.hl{display:flex;align-items:center;gap:12px;}.hlogo{height:34px;width:34px;object-fit:contain;filter:brightness(0) invert(1);}
.hname{color:#fff;font-size:15px;font-weight:700;}.hsub{color:rgba(255,255,255,.4);font-size:11px;margin-top:1px;}
.apill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:5px 14px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.85);font-weight:500;}
.apill:hover{background:rgba(255,255,255,.18);}
.adot{width:7px;height:7px;border-radius:50%;background:var(--red);}.adot.on{background:var(--green);}
.page{display:grid;grid-template-columns:220px 1fr;gap:20px;padding:20px;max-width:1200px;margin:0 auto;}
.sb{display:flex;flex-direction:column;gap:14px;position:sticky;top:68px;height:fit-content;}
.sc{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 16px rgba(24,50,100,.08);overflow:hidden;}
.sch{padding:10px 15px;background:var(--lgray);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--gray);letter-spacing:.1em;text-transform:uppercase;}
.ml{padding:6px;}
.mb{width:100%;padding:10px 11px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'Noto Sans KR',sans-serif;transition:all .15s;text-align:left;color:#475569;}
.mb:hover{background:var(--light);color:var(--navy);}.mb.on{background:var(--navy);color:#fff;}.mb.on .mico{background:rgba(255,255,255,.15);}
.mico{width:30px;height:30px;border-radius:7px;background:rgba(24,50,100,.07);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.mn{font-size:12px;font-weight:600;}.md{font-size:10px;opacity:.55;margin-top:1px;}
.qts{padding:9px 11px;display:flex;flex-wrap:wrap;gap:5px;}
.qt{padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:500;color:var(--navy);background:#fff;cursor:pointer;}
.qt:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.main{display:flex;flex-direction:column;gap:16px;}
.ic{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 16px rgba(24,50,100,.08);overflow:hidden;}
.ih{background:var(--navy);padding:16px 22px;}.iht{color:#fff;font-size:15px;font-weight:700;}.ihs{color:rgba(255,255,255,.45);font-size:11px;margin-top:3px;}
.ib{padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
label{display:block;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:5px;}
label span{font-weight:400;color:#94a3b8;}
input[type=text],select,textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:#1e293b;outline:none;transition:all .2s;background:#fff;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(24,50,100,.06);}
textarea{resize:vertical;min-height:72px;line-height:1.65;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.gbtn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.gbtn:hover:not(:disabled){background:var(--navy2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(24,50,100,.25);}
.gbtn:disabled{background:#94a3b8;cursor:not-allowed;transform:none;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.oc{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 16px rgba(24,50,100,.08);overflow:hidden;display:none;}.oc.show{display:block;}
.oh{padding:13px 20px;background:var(--lgray);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ot{font-size:13px;font-weight:700;color:var(--navy);}.oacts{display:flex;gap:8px;}
.obtn{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;border:1.5px solid var(--border);background:#fff;color:var(--navy);}
.obtn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.obtn.dl{background:var(--navy);color:#fff;border-color:var(--navy);}.obtn.dl:hover{background:var(--navy2);}
.ob{padding:20px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.card-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.card-canvas{border-radius:10px;box-shadow:0 4px 16px rgba(24,50,100,.15);width:100%;max-width:280px;display:block;}
.card-dl-btn{width:100%;max-width:280px;padding:9px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.card-dl-btn:hover{background:var(--navy2);}.card-label{font-size:11px;color:var(--gray);font-weight:500;}
.plain-out{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 16px rgba(24,50,100,.08);overflow:hidden;display:none;}.plain-out.show{display:block;}
.plain-body{padding:20px 24px;font-size:13px;line-height:1.85;color:#1e293b;white-space:pre-wrap;}
.rc{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 2px 16px rgba(24,50,100,.08);overflow:hidden;display:none;}.rc.show{display:block;}
.rch{padding:11px 18px;background:var(--light);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.rct{font-size:12px;font-weight:700;color:var(--navy);}.rcs{font-size:11px;color:var(--gray);margin-left:auto;}
.rqbs{padding:8px 14px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border);}
.rqb{padding:4px 11px;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:500;color:var(--navy);background:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.rqb:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.clog{padding:12px 16px;display:flex;flex-direction:column;gap:9px;max-height:200px;overflow-y:auto;}
.cmsg{display:flex;gap:9px;align-items:flex-start;}.cmsg.u{flex-direction:row-reverse;}
.cav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.cav.ai{background:var(--navy);color:#fff;}.cav.me{background:var(--light);color:var(--navy);}
.cbbl{padding:9px 13px;border-radius:12px;font-size:12px;line-height:1.65;max-width:88%;}
.cbbl.ai{background:var(--lgray);color:#334155;border:1px solid var(--border);border-top-left-radius:4px;}
.cbbl.me{background:var(--navy);color:#fff;border-top-right-radius:4px;}
.rinrow{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:flex-end;}
.rtarea{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:#1e293b;outline:none;resize:none;line-height:1.5;min-height:42px;max-height:90px;}
.rtarea:focus{border-color:var(--navy);}
.rsend{padding:10px 16px;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.rsend:hover:not(:disabled){background:var(--navy2);}.rsend:disabled{background:#94a3b8;cursor:not-allowed;}
.mbg{display:none;position:fixed;inset:0;background:rgba(14,28,62,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}.mbg.open{display:flex;}
.mbox{background:#fff;border-radius:16px;padding:30px;width:460px;box-shadow:0 24px 80px rgba(14,28,62,.25);}
.mbox h3{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.mbox p{font-size:13px;color:var(--gray);line-height:1.65;margin-bottom:4px;}.mbox a{color:var(--navy);font-weight:600;}
.mbox input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:monospace;color:#1e293b;outline:none;margin-top:12px;}
.mbox input:focus{border-color:var(--navy);}
.mbtns{display:flex;gap:10px;margin-top:16px;}
.mok{flex:1;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}.mok:hover{background:var(--navy2);}
.mcc{padding:12px 18px;background:#fff;color:var(--gray);border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.toast{position:fixed;bottom:26px;right:26px;background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 28px rgba(14,28,62,.3);opacity:0;transform:translateY(60px);transition:all .28s;z-index:400;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.prog{padding:30px;text-align:center;color:var(--navy);font-size:13px;font-weight:500;}
</style>
</head>
<body>
<div class="mbg" id="mbg">
  <div class="mbox">
    <h3>&#128273; Gemini API 키 설정</h3>
    <p>Google AI Studio에서 발급받은 API 키를 입력하세요.</p>
    <p><a href="https://aistudio.google.com/app/apikey" target="_blank">&#8594; aistudio.google.com에서 발급받기</a></p>
    <p style="font-size:12px;color:#94a3b8;margin-top:6px;">키는 이 브라우저에만 저장됩니다.</p>
    <input type="password" id="ki" placeholder="AIza...">
    <div class="mbtns">
      <button class="mcc" onclick="closeM()">취소</button>
      <button class="mok" onclick="saveK()">저장하기</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

function buildPrompt(topic, target, tone, count, extra) {
  return BRAND
    + '\n\n아래 조건으로 인스타그램 카드뉴스 슬라이드 ' + count + '개를 만들어주세요.'
    + '\n주제: ' + topic
    + '\n타겟: ' + target
    + '\n톤: ' + tone
    + (extra ? '\n추가요청: ' + extra : '')
    + '\n\n반드시 아래 JSON 형식으로만 응답하세요. JSON 외 다른 텍스트는 절대 출력하지 마세요.'
    + '\n마크다운 기호(#, *, **, -, 1. 등)는 어떤 경우에도 절대 사용하지 마세요.'
    + '\n모든 텍스트는 순수 한국어 문장만 사용하세요.'
    + '\n\n{"slides":['
    + '\n  {"type":"cover","headline":"임팩트있는 헤드라인 1~2줄"},'
    + '\n  {"type":"normal","tag":"태그라벨(10자이내)","headline":"헤드라인 1~2줄","body":"본문 2~3줄 설명"},'
    + '\n  ... (슬라이드 수만큼 반복)'
    + '\n  {"type":"cta","headline":"행동유도 문구","body":"남양주시 다산중앙로146번길 12-1 3층\\n최대 5명 소수정예\\n@dasan_cartel_academy"}'
    + '\n]}'
    + '\n\nslides 배열의 첫번째는 반드시 cover, 마지막은 반드시 cta, 중간은 모두 normal 타입으로 작성하세요.';
}

function buildRefinePrompt(req, prevText) {
  return BRAND
    + '\n\n기존 카드뉴스 JSON:\n' + prevText
    + '\n\n수정 요청: ' + req
    + '\n\n위 JSON을 수정 요청에 맞게 수정해서 동일한 JSON 형식으로만 응답하세요.'
    + '\n마크다운 기호(#, *, **, -) 절대 사용 금지. 순수 텍스트만 사용.'
    + '\nJSON 외 다른 텍스트 출력 금지.';
}

function callAI(prompt) {
  return fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + apiKey,
    {method:'POST', headers:{'Content-Type':'application/json'},
     body: JSON.stringify({contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.7, maxOutputTokens:4000}})}
  ).then(function(r) {
    if (r.status===401||r.status===403) throw new Error('API 키 오류. 우측 상단에서 확인해주세요.');
    if (r.status===429) throw new Error('요청 한도 초과. 잠시 후 다시 시도해주세요.');
    if (!r.ok) throw new Error('서버 오류 ' + r.status);
    return r.json();
  }).then(function(d) {
    var t = d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0] ? d.candidates[0].content.parts[0].text : '';
    if (!t) throw new Error('응답이 비어있습니다.');
    return t;
  });
}

// JSON 파싱 - 마크다운 응답이 와도 JSON만 추출
function parseJSON(text) {
  var match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('JSON 형식 응답을 받지 못했습니다. 다시 시도해주세요.');
  var data = JSON.parse(match[0]);
  if (!data.slides || !Array.isArray(data.slides)) throw new Error('슬라이드 데이터가 없습니다.');
  return data.slides.map(function(s) {
    return {
      type: s.type || 'normal',
      tag: clean(s.tag || ''),
      headline: clean(s.headline || ''),
      body: clean(s.body || ''),
      title: s.title || ''
    };
  });
}

// Canvas 카드 그리기 - 레이아웃 전면 재설계
function drawCard(slide, idx, total, logo) {
  var SZ = 1080;
  var PAD = 72;
  var cv = document.createElement('canvas');
  cv.width = SZ; cv.height = SZ;
  var ctx = cv.getContext('2d');

  var dark = idx % 2 === 0;
  var bg   = dark ? NAVY : WHITE;
  var fg   = dark ? WHITE : NAVY;
  var muted = dark ? 'rgba(255,255,255,0.5)' : 'rgba(24,50,100,0.55)';
  var tagBg  = dark ? 'rgba(255,255,255,0.15)' : NAVY;
  var tagFg  = WHITE;
  var boxBg  = dark ? 'rgba(255,255,255,0.08)' : 'rgba(24,50,100,0.05)';
  var boxBd  = dark ? 'rgba(255,255,255,0.15)' : 'rgba(24,50,100,0.15)';
  var lineFg = dark ? 'rgba(255,255,255,0.15)' : 'rgba(24,50,100,0.12)';
  var hdrFg  = dark ? 'rgba(255,255,255,0.35)' : 'rgba(24,50,100,0.35)';
  var accentLine = dark ? 'rgba(255,255,255,0.5)' : NAVY;

  // 배경
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, SZ, SZ);

  // 배경 장식 원 (우하단)
  ctx.save();
  ctx.globalAlpha = dark ? 0.06 : 0.04;
  ctx.beginPath(); ctx.arc(SZ, SZ, 320, 0, Math.PI*2);
  ctx.strokeStyle = fg; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); ctx.arc(SZ, SZ, 200, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // ── 헤더 영역 (로고 + 학원명 + 페이지번호) ──
  var HDR_Y = 56;
  var HDR_H = 52;

  // 로고
  if (logo && logo.complete && logo.naturalWidth > 0) {
    var oc = document.createElement('canvas');
    oc.width = logo.naturalWidth; oc.height = logo.naturalHeight;
    var ox = oc.getContext('2d');
    ox.drawImage(logo, 0, 0);
    ox.globalCompositeOperation = 'source-in';
    ox.fillStyle = fg;
    ox.fillRect(0, 0, oc.width, oc.height);
    ctx.drawImage(oc, PAD, HDR_Y + (HDR_H-40)/2, 40, 40);
  }

  // 학원명
  ctx.fillStyle = hdrFg;
  ctx.font = '500 20px Noto Sans KR,sans-serif';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillText('\uCE74\uB974\uD154 \uAD6D\uC5B4\uD559\uC6D0 \uB2E4\uC0B0\uAD00', PAD + 52, HDR_Y + HDR_H/2);

  // 페이지 번호
  ctx.fillStyle = hdrFg;
  ctx.font = '400 19px Noto Sans KR,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText((idx+1) + ' / ' + total, SZ - PAD, HDR_Y + HDR_H/2);
  ctx.textAlign = 'left';

  // 헤더 하단 구분선
  ctx.fillStyle = lineFg;
  ctx.fillRect(PAD, HDR_Y + HDR_H + 6, SZ - PAD*2, 1);

  // ── 콘텐츠 영역 ──
  var CONTENT_TOP = HDR_Y + HDR_H + 30;
  var CONTENT_BOT = SZ - 90; // 하단 계정명 공간 확보
  var CONTENT_H   = CONTENT_BOT - CONTENT_TOP;

  ctx.textBaseline = 'top';

  if (slide.type === 'cover') {
    // 커버: 중앙 정렬, 큰 헤드라인
    var cMid = CONTENT_TOP + CONTENT_H / 2;

    // 액센트 라인
    ctx.fillStyle = accentLine;
    ctx.fillRect(PAD, cMid - 80, 44, 4);

    // 헤드라인
    ctx.fillStyle = fg;
    ctx.font = '900 88px Noto Sans KR,sans-serif';
    var hlY = cMid - 60;
    hlY = wrapText(ctx, slide.headline, PAD, hlY, SZ - PAD*2, 108);

  } else if (slide.type === 'cta') {
    // CTA: 헤드라인 상단, 정보 박스 하단
    ctx.fillStyle = accentLine;
    ctx.fillRect(PAD, CONTENT_TOP + 10, 44, 4);

    ctx.fillStyle = fg;
    ctx.font = '900 76px Noto Sans KR,sans-serif';
    var ctaY = CONTENT_TOP + 30;
    ctaY = wrapText(ctx, slide.headline, PAD, ctaY, SZ - PAD*2, 96);

    // 정보 박스 - 하단 고정
    var BOX_H = 260;
    var BOX_Y = CONTENT_BOT - BOX_H;
    ctx.fillStyle = boxBg;
    rRect(ctx, PAD, BOX_Y, SZ - PAD*2, BOX_H, 16); ctx.fill();
    ctx.strokeStyle = boxBd; ctx.lineWidth = 1;
    rRect(ctx, PAD, BOX_Y, SZ - PAD*2, BOX_H, 16); ctx.stroke();

    ctx.fillStyle = dark ? 'rgba(255,255,255,0.75)' : 'rgba(24,50,100,0.75)';
    ctx.font = '400 27px Noto Sans KR,sans-serif';
    wrapText(ctx, slide.body, PAD + 28, BOX_Y + 32, SZ - PAD*2 - 56, 54);

  } else {
    // 일반 슬라이드: 태그 → 헤드라인 → 본문 균형 배치
    var curY = CONTENT_TOP + 20;

    // 태그 배지
    if (slide.tag) {
      ctx.font = '700 22px Noto Sans KR,sans-serif';
      var tw = ctx.measureText(slide.tag).width;
      ctx.fillStyle = tagBg;
      rRect(ctx, PAD, curY, tw + 34, 42, 8); ctx.fill();
      ctx.fillStyle = tagFg;
      ctx.textBaseline = 'middle';
      ctx.fillText(slide.tag, PAD + 17, curY + 21);
      ctx.textBaseline = 'top';
      curY += 62;
    }

    // 액센트 라인
    ctx.fillStyle = accentLine;
    ctx.fillRect(PAD, curY, 44, 3);
    curY += 20;

    // 헤드라인
    ctx.fillStyle = fg;
    ctx.font = '900 76px Noto Sans KR,sans-serif';
    curY = wrapText(ctx, slide.headline, PAD, curY, SZ - PAD*2, 96);
    curY += 28;

    // 본문 - 헤드라인과 적절한 간격
    if (slide.body) {
      ctx.fillStyle = muted;
      ctx.font = '400 32px Noto Sans KR,sans-serif';
      // 본문이 하단을 넘지 않도록 제한
      var maxBodyY = CONTENT_BOT - 60;
      if (curY < maxBodyY) {
        wrapText(ctx, slide.body, PAD, curY, SZ - PAD*2, 50, maxBodyY);
      }
    }
  }

  // ── 하단 계정명 ──
  ctx.fillStyle = hdrFg;
  ctx.font = '400 20px Noto Sans KR,sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('@dasan_cartel_academy', PAD, SZ - 34);

  return cv;
}

function rRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lh, maxY) {
  var chars = (text||'').split('');
  var line = ''; var curY = y;
  for (var i = 0; i < chars.length; i++) {
    if (maxY && curY + lh > maxY) break;
    if (chars[i] === '\n') {
      ctx.fillText(line, x, curY); curY += lh; line = '';
    } else {
      var test = line + chars[i];
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, x, curY); curY += lh; line = chars[i];
      } else { line = test; }
    }
  }
  if (line && (!maxY || curY + lh <= maxY + lh)) {
    ctx.fillText(line, x, curY); curY += lh;
  }
  return curY;
}

function doRender(slides, logo) {
  var grid = document.getElementById('cardGrid');
  grid.innerHTML = ''; lastCanvases = [];
  slides.forEach(function(slide, i) {
    var cv = drawCard(slide, i, slides.length, logo);
    lastCanvases.push(cv);
    var wrap = document.createElement('div'); wrap.className = 'card-wrap';
    var prev = document.createElement('canvas'); prev.className = 'card-canvas';
    prev.width = cv.width; prev.height = cv.height;
    prev.getContext('2d').drawImage(cv, 0, 0);
    var lbl = document.createElement('div'); lbl.className = 'card-label';
    lbl.textContent = '\uC2AC\uB77C\uC774\uB4DC ' + (i+1);
    var btn = document.createElement('button'); btn.className = 'card-dl-btn';
    btn.textContent = '\u2B07 PNG \uC800\uC7A5';
    (function(c, n) {
      btn.addEventListener('click', function() {
        var a = document.createElement('a');
        a.download = '\uCE74\uB974\uD154_\uCE74\uB4DC\uB274\uC2A4_' + n + '.png';
        a.href = c.toDataURL('image/png'); a.click();
      });
    })(cv, i+1);
    wrap.appendChild(prev); wrap.appendChild(lbl); wrap.appendChild(btn);
    grid.appendChild(wrap);
  });
  document.getElementById('ot').textContent = '\uC0DD\uC131 \uC644\uB8CC \u2014 ' + slides.length + '\uC7A5 PNG \uC900\uBE44\uB428';
  toast(slides.length + '\uC7A5 PNG \uC0DD\uC131 \uC644\uB8CC!');
}

function loadAndRender(slides) {
  var logo = new Image();
  logo.onload = function() { doRender(slides, logo); };
  logo.onerror = function() { doRender(slides, null); };
  logo.src = LOGO_SRC;
}

function doRefine() {
  var ta = document.getElementById('rta');
  var req = ta.value.trim(); if (!req) return;
  addChat('user', req); ta.value = '';
  document.getElementById('rsend').disabled = true;
  document.getElementById('rsend').textContent = '...';

  var prompt = mode === 'card'
    ? buildRefinePrompt(req, lastText)
    : BRAND + ' \uAE30\uC874:\n' + lastText + '\n\uC218\uC815\uC694\uCCAD: ' + req + ' \uAC19\uC740 \uD615\uC2DD\uC73C\uB85C \uC804\uCCB4\uB97C \uB2E4\uC2DC \uC791\uC131\uD558\uC138\uC694.';

  callAI(prompt).then(function(text) {
    lastText = text;
    if (mode === 'card') {
      try {
        lastSlides = parseJSON(text);
        document.getElementById('cardGrid').innerHTML = '<div class="prog">\uC218\uC815\uB41C \uCE74\uB4DC\uB97C \uADF8\uB9AC\uB294 \uC911...</div>';
        loadAndRender(lastSlides);
        addChat('ai', '\uC218\uC815 \uC644\uB8CC! PNG\uAC00 \uC5C5\uB370\uC774\uD2B8\uB418\uC5C8\uC2B5\uB2C8\uB2E4.');
      } catch(e) {
        addChat('ai', '\uD30C\uC2F1 \uC624\uB958: ' + e.message);
      }
    } else {
      document.getElementById('plainBody').textContent = text;
      addChat('ai', '\uC218\uC815 \uC644\uB8CC!');
    }
    document.getElementById('rsend').disabled = false;
    document.getElementById('rsend').textContent = '\uC218\uC815';
  }).catch(function(e) {
    addChat('ai', '\uC624\uB958: ' + e.message);
    document.getElementById('rsend').disabled = false;
    document.getElementById('rsend').textContent = '\uC218\uC815';
  });
}

window.handleKey = function(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); doRefine(); } };
window.refine = doRefine;
window.copyPlain = function() {
  navigator.clipboard.writeText(lastText).then(function() {
    var b = document.getElementById('copyBtn');
    b.textContent = '\u2713 \uBCF5\uC0AC\uB428';
    setTimeout(function() { b.textContent = '\uC804\uCCB4 \uBCF5\uC0AC'; }, 2000);
  });
};

function addChat(role, msg) {
  var log = document.getElementById('clog');
  var isU = role==='user';
  var d = document.createElement('div'); d.className = 'cmsg'+(isU?' u':'');
  var av = document.createElement('div'); av.className = 'cav '+(isU?'me':'ai');
  av.textContent = isU?'\uB098':'AI';
  var bb = document.createElement('div'); bb.className = 'cbbl '+(isU?'me':'ai');
  bb.textContent = msg;
  d.appendChild(av); d.appendChild(bb);
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}

function setLd(on) {
  document.getElementById('gbtn').disabled = on;
  document.getElementById('spin').style.display = on?'block':'none';
  document.getElementById('gtxt').textContent = on
    ? '\uC0DD\uC131 \uC911...'
    : (mode==='card' ? '\u2726 \uCE74\uB4DC\uB274\uC2A4 \uC0DD\uC131 & PNG \uB2E4\uC6B4\uB85C\uB4DC' : '\u2726 \uCF58\uD150\uCE20 \uC0DD\uC131\uD558\uAE30');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2800);
}

window.onload = function() { updSt(); };

})();

</script>
</body>
</html>
